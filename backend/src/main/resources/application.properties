spring.application.name=backend
server.port=8088
#==================  db ==========================
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.datasource.url=jdbc:postgresql://postgres:5433/pos_db // for running in docker
spring.datasource.url=jdbc:postgresql://localhost:5433/pos_db
spring.datasource.username=phaiecobyte
spring.datasource.password=phaiecobyte

#=================== Flyway ======================
#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration

#=================== hibernate ====================
spring.jpa.hibernate.ddl-auto=create-drop

#=================== Security ======================
# JWT Configuration - Should be set via environment variable in production
app.jwt-key=${JWT_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt-expiration-ms=900000
app.jwt-refresh-expiration-ms=604800000

#=================== Cookie Security ======================
# Secure flag for cookies - set to true in production (HTTPS only)
app.cookie.secure=${COOKIE_SECURE:false}

#=================== CORS Configuration ======================
# Allowed origins - configure via environment variable for production
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}

#=================== Brute Force Protection ======================
# Maximum login attempts before account lockout
app.security.max-login-attempts=${MAX_LOGIN_ATTEMPTS:50}
# Account lockout duration in minutes
app.security.lockout-duration-minutes=${LOCKOUT_DURATION_MINUTES:15}

logging.level.org.springframework.security=DEBUG

spring.docker.compose.lifecycle-management=none
spring.docker.compose.enabled=false

# Enable SQL logging to the console
spring.jpa.show-sql=true

# Pretty-print and format the logged SQL
spring.jpa.properties.hibernate.format_sql=true

# Optional: Add ANSI color highlighting
spring.jpa.properties.hibernate.highlight_sql=true


#================= Spring Boot Dev Tool ==================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true


# ==========================================================
#                       Media (MinIO)
# ==========================================================
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:phaiecobyte}
minio.secret-key=${MINIO_SECRET_KEY:phaiecobyte@123}
media.bucket=${MEDIA_BUCKET:pos-system}
app.allow.file.type=${APP_ALLOW_FILE_TYPE:jpg,png,svg}
app.max.file.size=${APP_MAX_FILE_SIZE:1024}